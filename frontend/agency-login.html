<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiris - Agency Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- Header -->
    <nav class="navbar navbar-expand-lg bg-night-blue navbar-dark sticky-top shadow-sm py-2 border-bottom animate-slide-down"
        style="border-color: var(--eiris-night-blue-shadow) !important;">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4 text-sand-tan" href="index.html">
                <div class="hover-rotate me-2">
                    <i class="bi bi-car-front-fill" style="color: var(--eiris-sand-tan); font-size: 1.5rem;"></i>
                </div>
                <span style="letter-spacing: 1px;">Eiris</span>
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light rounded-pill px-4">
                    <i class="bi bi-arrow-left me-2"></i> Back to Home
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5 min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden animate-fade-in-up"
            style="max-width: 900px; width: 100%;">
            <div class="row g-0">
                <div class="col-md-5 d-none d-md-block bg-night-blue position-relative text-center">
                    <div class="position-absolute top-50 start-50 translate-middle w-100 p-4">
                        <i class="bi bi-shield-fill-check text-sand-tan mb-3 animate-float-1"
                            style="font-size: 5rem;"></i>
                        <h3 class="text-white fw-bold">Agency Partner Portal</h3>
                        <p class="text-white opacity-75 mt-3">Manage your orders, inventory, and clients all in one
                            place.</p>
                    </div>
                </div>
                <div class="col-md-7 p-5">
                    <h3 class="fw-bold text-night-blue-shadow mb-4">Welcome Back!</h3>
                    <p class="text-muted mb-4">Please enter your agency credentials to access the portal.</p>

                    <form onsubmit="handleAgencyLogin(event)">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-night-blue-shadow">Email Id</label>
                            <input type="email" id="agencyEmail" class="form-control form-control-lg bg-light border-0"
                                placeholder="email@agency.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-night-blue-shadow">Password</label>
                            <input type="password" id="agencyPassword" class="form-control form-control-lg bg-light border-0"
                                placeholder="Enter your password" required>
                            <div id="loginErrorMsg" class="text-danger small fw-bold mt-2 d-none">Invalid Credentials</div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted small" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                        </div>
                        <button type="submit" id="loginBtn"
                            class="btn btn-secondary-custom btn-lg rounded-pill w-100 shadow-sm fw-bold">Login to
                            Dashboard</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Axios and API Service -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/apiService.js"></script>

    <!-- Custom JS -->
    <script src="js/script.js"></script>

    <!-- Login Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedEmail = localStorage.getItem('rememberedAgencyEmail');
            if (savedEmail) {
                document.getElementById('agencyEmail').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        async function handleAgencyLogin(e) {
            e.preventDefault();
            const email = document.getElementById('agencyEmail').value;
            const password = document.getElementById('agencyPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('loginErrorMsg');

            errorMsg.classList.add('d-none');

            if (!email || !password) {
                errorMsg.textContent = "Please enter both email and password.";
                errorMsg.classList.remove('d-none');
                return;
            }

            const originalBtnText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Logging in...';
            loginBtn.disabled = true;

            try {
                const response = await authService.login(email, password);
                const user = response.user;

                if (user.role === 'AGENCY') {
                    if (rememberMe) {
                        localStorage.setItem('rememberedAgencyEmail', email);
                    } else {
                        localStorage.removeItem('rememberedAgencyEmail');
                    }
                    window.location.href = 'agency-dashboard.html';
                } else {
                    errorMsg.textContent = "Invalid Credentials.";
                    errorMsg.classList.remove('d-none');
                    authService.logout();
                }
            } catch (error) {
                errorMsg.textContent = "Invalid Credentials.";
                errorMsg.classList.remove('d-none');
            } finally {
                loginBtn.innerHTML = originalBtnText;
                loginBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
