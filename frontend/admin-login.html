<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiris - Admin Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- Header -->
    <nav class="navbar navbar-expand-lg bg-night-blue navbar-dark sticky-top shadow-sm py-2 border-bottom animate-slide-down"
        style="border-color: var(--eiris-night-blue-shadow) !important;">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4 text-sand-tan" href="index.html">
                <div class="hover-rotate me-2">
                    <i class="bi bi-car-front-fill" style="color: var(--eiris-sand-tan); font-size: 1.5rem;"></i>
                </div>
                <span style="letter-spacing: 1px;">Eiris</span>
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light rounded-pill px-4">
                    <i class="bi bi-arrow-left me-2"></i> Back to Home
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5 min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden animate-fade-in-up"
            style="max-width: 900px; width: 100%;">
            <div class="row g-0">
                <div class="col-md-5 d-none d-md-block bg-night-blue position-relative text-center">
                    <div class="position-absolute top-50 start-50 translate-middle w-100 p-4">
                        <i class="bi bi-shield-lock-fill text-sand-tan mb-3 animate-float-1"
                            style="font-size: 5rem;"></i>
                        <h3 class="text-white fw-bold">Admin Portal</h3>
                        <p class="text-white opacity-75 mt-3">Manage your system, users, products, and overall operations all in one place.</p>
                    </div>
                </div>
                <div class="col-md-7 p-5">
                    <h3 class="fw-bold text-night-blue-shadow mb-4" id="formTitle">Welcome Back Admin!</h3>
                    <p class="text-muted mb-4" id="formSubtitle">Please enter your admin credentials to access the portal.</p>

                    <form id="loginFormElement">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-night-blue-shadow">Email Id</label>
                            <input type="email" id="adminEmail" class="form-control form-control-lg bg-light border-0"
                                placeholder="admin@eiris.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-night-blue-shadow">Password</label>
                            <div class="input-group">
                                <input type="password" id="adminPassword" class="form-control form-control-lg bg-light border-0"
                                    placeholder="Enter your password" required>
                                <button class="btn bg-light border-0 text-secondary px-3" type="button" onclick="togglePasswordVisibility('adminPassword', 'eyeIcon')">
                                    <i class="bi bi-eye-slash" id="eyeIcon"></i>
                                </button>
                            </div>
                            <div id="loginErrorMsg" class="text-danger small fw-bold mt-2 d-none">Invalid Credentials</div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted small" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" onclick="showForgotPassword(event)" class="text-decoration-none small fw-bold text-primary">Forgot Password?</a>
                        </div>
                        <button type="button" id="loginBtn" onclick="handleAdminLogin()"
                            class="btn btn-secondary-custom btn-lg rounded-pill w-100 shadow-sm fw-bold">Login to
                            Dashboard</button>
                    </form>

                    <!-- Forgot Password Form -->
                    <form id="forgotPasswordForm" class="d-none">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-night-blue-shadow">Registered Email Id</label>
                            <input type="email" id="forgotEmail" class="form-control form-control-lg bg-light border-0"
                                placeholder="admin@eiris.com" required>
                            <div id="forgotErrorMsg" class="text-danger small fw-bold mt-2 d-none">Error message here</div>
                            <div id="forgotSuccessMsg" class="text-success small fw-bold mt-2 d-none">Success message here</div>
                        </div>
                        <button type="button" id="forgotBtn" onclick="handleForgotPassword()"
                            class="btn btn-primary btn-lg rounded-pill w-100 shadow-sm fw-bold mb-3">Send Reset Link</button>
                        <div class="text-center">
                            <a href="#" onclick="showLogin(event)" class="text-decoration-none small fw-bold text-secondary">
                                <i class="bi bi-arrow-left"></i> Back to Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Axios and API Service -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/apiService.js"></script>

    <!-- Custom JS -->
    <script src="js/script.js"></script>

    <!-- Login & Forgot Password Logic -->
    <script>
        // Remember Me Logic (On Load)
        document.addEventListener("DOMContentLoaded", () => {
            const savedEmail = localStorage.getItem('rememberedAdminEmail');
            if (savedEmail) {
                document.getElementById('adminEmail').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        function showForgotPassword(e) {
            if (e) e.preventDefault();
            document.getElementById('loginFormElement').classList.add('d-none');
            document.getElementById('forgotPasswordForm').classList.remove('d-none');
            document.getElementById('formTitle').textContent = 'Reset Password';
            document.getElementById('formSubtitle').textContent = 'Enter your email to receive a password reset link.';
        }

        function showLogin(e) {
            if (e) e.preventDefault();
            document.getElementById('forgotPasswordForm').classList.add('d-none');
            document.getElementById('loginFormElement').classList.remove('d-none');
            document.getElementById('formTitle').textContent = 'Welcome Back Admin!';
            document.getElementById('formSubtitle').textContent = 'Please enter your admin credentials to access the portal.';
        }

        function togglePasswordVisibility(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('bi-eye-slash');
                eyeIcon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('bi-eye');
                eyeIcon.classList.add('bi-eye-slash');
            }
        }

        async function handleAdminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('loginErrorMsg');

            // Hide error initially
            errorMsg.classList.add('d-none');

            if (!email || !password) {
                errorMsg.textContent = "Please enter both email and password.";
                errorMsg.classList.remove('d-none');
                return;
            }

            // Show loading state
            const originalBtnText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Logging in...';
            loginBtn.disabled = true;

            try {
                // Call the API service login function
                const response = await authService.login(email, password);
                const user = response.user;

                // Strict Admin check
                if (user.role === 'ADMIN') {
                    // Handle Remember Me
                    if (rememberMe) {
                        localStorage.setItem('rememberedAdminEmail', email);
                    } else {
                        localStorage.removeItem('rememberedAdminEmail');
                    }
                    
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorMsg.textContent = "Access Denied: You do not have Admin privileges.";
                    errorMsg.classList.remove('d-none');
                    authService.logout();
                }

            } catch (error) {
                errorMsg.classList.remove('d-none');
                
                if (error.response && error.response.status === 401) {
                    errorMsg.textContent = "Invalid Credentials";
                } else {
                    errorMsg.textContent = "An error occurred during login. Please try again later.";
                }
            } finally {
                // Restore button state
                loginBtn.innerHTML = originalBtnText;
                loginBtn.disabled = false;
            }
        }

        async function handleForgotPassword() {
            const email = document.getElementById('forgotEmail').value;
            const forgotBtn = document.getElementById('forgotBtn');
            const errorMsg = document.getElementById('forgotErrorMsg');
            const successMsg = document.getElementById('forgotSuccessMsg');

            errorMsg.classList.add('d-none');
            successMsg.classList.add('d-none');

            if (!email) {
                errorMsg.textContent = "Please enter your registered email.";
                errorMsg.classList.remove('d-none');
                return;
            }

            const originalBtnText = forgotBtn.innerHTML;
            forgotBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';
            forgotBtn.disabled = true;

            try {
                const responseMessage = await authService.forgotPassword(email);
                successMsg.textContent = responseMessage;
                successMsg.classList.remove('d-none');
            } catch (error) {
                errorMsg.textContent = "An error occurred. Please try again.";
                errorMsg.classList.remove('d-none');
            } finally {
                forgotBtn.innerHTML = originalBtnText;
                forgotBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
