<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiris - Agency Buy Products</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Custom Tab Styles */
        .custom-tabs { gap: 15px; border: none; }
        .custom-tabs .nav-link { background-color: transparent; border: 1px solid var(--eiris-dark-green); color: #a0aab2; border-radius: 8px; padding: 10px 24px; font-weight: 500; transition: all 0.3s ease; }
        .custom-tabs .nav-link:hover { color: var(--eiris-sage-green); border-color: var(--eiris-sage-green); }
        .custom-tabs .nav-link.active { background-color: rgba(156, 176, 128, 0.15); border: 1px solid var(--eiris-sage-green); color: var(--eiris-sage-green); }
    </style>
</head>
<body class="bg-light">

    <div class="d-flex min-vh-100 bg-light">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar text-white position-relative animate-slide-right" style="width: 280px; background-color: var(--eiris-night-blue-shadow);">
            <div class="p-4 d-flex align-items-center border-bottom border-secondary border-opacity-25">
                <i class="bi bi-shield-fill-exclamation text-sand-tan me-2" style="font-size: 30px;"></i>
                <h4 class="mb-0 fw-bold text-sand-tan">Agency Portal</h4>
            </div>
            <ul class="nav flex-column p-3 gap-2">
                <li class="nav-item">
                    <a href="agency-dashboard.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-grid-1x2-fill me-3" style="font-size: 20px;"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="agency-clients.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-people-fill me-3" style="font-size: 20px;"></i> Clients
                    </a>
                </li>
                <li class="nav-item">
                    <a href="agency-purchase.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-cart-fill me-3" style="font-size: 20px;"></i> Buy Products
                    </a>
                </li>
                <li class="nav-item">
                    <a href="agency-stocks.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-box-seam-fill me-3" style="font-size: 20px;"></i> My Stocks
                    </a>
                </li>
                <li class="nav-item">
                    <a href="agency-sales.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-graph-up-arrow me-3" style="font-size: 20px;"></i> Sales
                    </a>
                </li>
            </ul>
            <div class="p-4 mt-auto position-absolute bottom-0 w-100" style="max-width: 280px;">
                <a href="#" data-bs-toggle="modal" data-bs-target="#logoutConfirmModal" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center border-opacity-25">
                    <i class="bi bi-box-arrow-right me-2" style="font-size: 18px;"></i> Logout
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 d-flex flex-column" style="overflow-y: auto; height: 100vh;">
            <nav class="navbar navbar-expand-lg bg-white border-bottom px-4 py-3 shadow-sm animate-slide-down">
                <div class="container-fluid">
                    <!-- Sidebar Toggle Button (Mobile/Tablet) -->
                    <button class="sidebar-toggle-btn d-lg-none me-auto" id="sidebarToggle">
                        <i class="bi bi-list fs-3"></i>
                    </button>
                    <div class="ms-auto d-flex align-items-center gap-3">
                        <span class="text-muted">Agency: <strong class="text-night-blue">AutoTech Distributors</strong></span>
                        <div class="text-white fw-bold rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="background-color: var(--eiris-sand-tan-shadow); width: 40px; height: 40px;">
                            AG
                        </div>
                    </div>
                </div>
            </nav>
            
            <div class="p-4 flex-grow-1 animate-fade-in-up">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-night-blue-shadow mb-0">Product Catalog</h3>
                    <div>
                        <button class="btn btn-primary-custom rounded-pill px-4 position-relative" id="viewCartBtn">
                            <i class="bi bi-cart3 me-2"></i> View Cart
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" id="cartBadge">
                                0
                                <span class="visually-hidden">items in cart</span>
                            </span>
                        </button>
                    </div>
                </div>
                
                <!-- Tabs -->
            <ul class="nav nav-pills custom-tabs mb-5 justify-content-center" id="productTabs" role="tablist">
                <li class="nav-item" role="presentation"><button class="nav-link active" id="tab-car-acc" data-bs-toggle="pill" data-bs-target="#pane-car-acc" type="button" role="tab">Car Accessories</button></li>
                <li class="nav-item" role="presentation"><button class="nav-link" id="tab-led-lights" data-bs-toggle="pill" data-bs-target="#pane-led-lights" type="button" role="tab">LED Lights</button></li>
                <li class="nav-item" role="presentation"><button class="nav-link" id="tab-fan-reg" data-bs-toggle="pill" data-bs-target="#pane-fan-reg" type="button" role="tab">Fan Regulator</button></li>
                <li class="nav-item" role="presentation"><button class="nav-link" id="tab-led-bulbs" data-bs-toggle="pill" data-bs-target="#pane-led-bulbs" type="button" role="tab">LED Bulbs</button></li>
                <li class="nav-item" role="presentation"><button class="nav-link" id="tab-led-emerg" data-bs-toggle="pill" data-bs-target="#pane-led-emerg" type="button" role="tab">Emergency LED</button></li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="productTabsContent">
                <div class="tab-pane fade show active" id="pane-car-acc" role="tabpanel"><div class="row g-4"></div></div>
                <div class="tab-pane fade" id="pane-led-lights" role="tabpanel"><div class="row g-4"></div></div>
                <div class="tab-pane fade" id="pane-fan-reg" role="tabpanel"><div class="row g-4"></div></div>
                <div class="tab-pane fade" id="pane-led-bulbs" role="tabpanel"><div class="row g-4"></div></div>
                <div class="tab-pane fade" id="pane-led-emerg" role="tabpanel"><div class="row g-4"></div></div>
            </div>
            </div>
        </div>
    </div>

    
    <!-- Logout Confirm Modal -->
    <div class="modal fade" id="logoutConfirmModal" tabindex="-1" aria-labelledby="logoutConfirmModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-modal-content">
                <div class="modal-body text-center p-5">
                    <div class="glass-icon-container">
                        <i class="bi bi-box-arrow-right"></i>
                    </div>
                    <h4 class="mb-3 fw-bold">Logout?</h4>
                    <p class="text-white-50 mb-4">Are you sure you want to log out of your account?</p>
                    <div class="d-flex justify-content-center gap-3">
                        <button type="button" class="btn btn-glass-cancel rounded-3 px-4 py-2 fw-semibold w-50" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-glass-delete rounded-3 px-4 py-2 fw-semibold w-50" onclick="performLogout()">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function performLogout() {
            if (typeof authService !== 'undefined') {
                authService.logout();
            } else {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                localStorage.removeItem('user');
            }
            window.location.href = 'index.html';
        }
    </script>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/productManager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            async function renderProducts() {
                const customProducts = window.productManager ? await window.productManager.getProducts() : [];
                const allProducts = [...customProducts];
                
                document.querySelectorAll('.tab-pane .row').forEach(row => row.innerHTML = '');

                allProducts.forEach(p => {
                    let targetPaneId = '';
                    switch(p.category) {
                        case 'Car Accessories': targetPaneId = 'pane-car-acc'; break;
                        case 'LED Lights': targetPaneId = 'pane-led-lights'; break;
                        case 'Fan Regulator': targetPaneId = 'pane-fan-reg'; break;
                        case 'LED Bulbs': targetPaneId = 'pane-led-bulbs'; break;
                        case 'Emergency LED': targetPaneId = 'pane-led-emerg'; break;
                    }
                    const targetPane = document.getElementById(targetPaneId);
                    if (targetPane) {
                        const row = targetPane.querySelector('.row');
                        if (row) {
                            const img = p.imageUrl || p.image;
                            const detailsList = p.details ? p.details.split(',').map(d => `<li>${d.trim()}</li>`).join('') : '';
                            const newId = 'detailsProductPage_' + p.id;
                            const productCard = `
                            <div class="col-md-6 col-lg-4 product-item">
                                <div class="h-100">
                                    <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden product-card custom-added-product" data-id="${p.id}">
                                        <div style="height: 200px; background-color: #f0f0f0; position: relative;">
                                            <img src="${img}" alt="${p.name}" style="width: 100%; height: 100%; object-fit: cover;">
                                            <span class="badge bg-night-blue position-absolute top-0 end-0 m-3 p-2">${p.category}</span>
                                        </div>
                                        <div class="card-body d-flex flex-column p-4">
                                            <h5 class="card-title fw-bold mb-2 text-night-blue-shadow">${p.name}</h5>
                                            <div class="collapse" id="${newId}">
                                                <ul class="text-start small text-dark mb-0 ps-3 mt-2">
                                                    ${detailsList}
                                                </ul>
                                            </div>
                                            <div class="d-flex justify-content-between align-items-center mt-3 mt-auto">
                                                <button class="btn btn-outline-primary btn-sm btn-secondary-custom rounded-pill px-3" data-bs-toggle="collapse" data-bs-target="#${newId}">View Details</button>
                                            </div>
                                            <div class="mt-3">
                                                <div class="d-flex justify-content-between align-items-center mb-3">
                                                    <span class="fw-bold fs-5 text-sand-tan-shadow">₹${p.price || 0} / unit</span>
                                                    ${(!p.hasOwnProperty('stock') || p.stock > 0) ? '<span class="text-success small"><i class="bi bi-check-circle-fill"></i> In Stock</span>' : '<span class="text-danger small"><i class="bi bi-x-circle-fill"></i> Out of Stock</span>'}
                                                </div>
                                                <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
                                                    <button class="btn btn-outline-dark rounded-circle d-flex align-items-center justify-content-center qty-btn minus-btn shadow-sm" style="width: 36px; height: 36px; border-width: 2px;" ${(!p.hasOwnProperty('stock') || p.stock > 0) ? '' : 'disabled'}>
                                                        <i class="bi bi-dash-lg"></i>
                                                    </button>
                                                    <input type="number" class="form-control text-center fw-bold qty-input shadow-sm border-dark" value="1" min="1" style="width: 70px; border-radius: 8px; border-width: 2px;" ${(!p.hasOwnProperty('stock') || p.stock > 0) ? '' : 'disabled'}>
                                                    <button class="btn btn-outline-dark rounded-circle d-flex align-items-center justify-content-center qty-btn plus-btn shadow-sm" style="width: 36px; height: 36px; border-width: 2px;" ${(!p.hasOwnProperty('stock') || p.stock > 0) ? '' : 'disabled'}>
                                                        <i class="bi bi-plus-lg"></i>
                                                    </button>
                                                </div>
                                                <button class="btn btn-outline-primary btn-secondary-custom rounded-pill w-100 add-to-cart-btn" data-product-id="${p.id}" ${(!p.hasOwnProperty('stock') || p.stock > 0) ? '' : 'disabled'}><i class="bi bi-cart-plus me-2"></i>Add to Order</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                            // Append to row
                            row.insertAdjacentHTML('beforeend', productCard);
                        }
                    }
                });
            }
            renderProducts();

            // Cart Interaction Logic
            function updateCartBadge() {
                const badge = document.getElementById('cartBadge');
                const totalItems = window.cartManager ? window.cartManager.getTotalItems() : 0;
                if (totalItems > 0) {
                    badge.innerText = totalItems;
                    badge.classList.remove('d-none');
                } else {
                    badge.classList.add('d-none');
                }
            }

            function renderCart() {
                const container = document.getElementById('cartItemsContainer');
                const totalEl = document.getElementById('cartTotal');
                const cart = window.cartManager ? window.cartManager.getCart() : [];
                
                if (cart.length === 0) {
                    container.innerHTML = '<div class="text-center text-muted mt-5"><i class="bi bi-cart-x fs-1"></i><p class="mt-2">Your cart is empty</p></div>';
                    totalEl.innerText = '₹0';
                    return;
                }

                let html = '';
                cart.forEach(item => {
                    const img = item.imageUrl || item.image || 'https://via.placeholder.com/60';
                    html += `
                    <div class="d-flex gap-3 border-bottom pb-3 mb-3 cart-item" data-id="${item.id}">
                        <img src="${img}" alt="${item.name}" class="rounded" style="width: 60px; height: 60px; object-fit: cover;">
                        <div class="flex-grow-1">
                            <h6 class="fw-bold mb-1 text-night-blue-shadow">${item.name}</h6>
                            <div class="text-muted small mb-2">₹${item.price} / unit</div>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn btn-sm btn-outline-secondary rounded-circle cart-minus-btn" style="width: 24px; height: 24px; padding: 0; line-height: 1;">-</button>
                                <input type="number" class="form-control form-control-sm text-center fw-bold cart-qty-input px-1" value="${item.quantity}" min="1" style="width: 45px; height: 24px;">
                                <button class="btn btn-sm btn-outline-secondary rounded-circle cart-plus-btn" style="width: 24px; height: 24px; padding: 0; line-height: 1;">+</button>
                            </div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold text-sand-tan-shadow mb-2">₹${item.price * item.quantity}</div>
                            <button class="btn btn-sm text-danger cart-remove-btn p-0"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
                totalEl.innerText = '₹' + window.cartManager.getTotalPrice();
            }

            window.addEventListener('cartChanged', () => {
                updateCartBadge();
                renderCart();
            });

            // Handle plus/minus buttons on product cards
            document.addEventListener('click', function(e) {
                if (e.target.closest('.qty-btn')) {
                    const btn = e.target.closest('.qty-btn');
                    const input = btn.parentElement.querySelector('.qty-input');
                    let val = parseInt(input.value) || 1;
                    if (btn.classList.contains('plus-btn')) {
                        input.value = val + 1;
                    } else if (btn.classList.contains('minus-btn') && val > 1) {
                        input.value = val - 1;
                    }
                }
                
                if (e.target.closest('.add-to-cart-btn')) {
                    const btn = e.target.closest('.add-to-cart-btn');
                    const productId = btn.getAttribute('data-product-id');
                    const input = btn.parentElement.querySelector('.qty-input');
                    const quantity = parseInt(input.value) || 1;
                    
                    window.productManager.getProducts().then(customProducts => {
                        const allProducts = [...customProducts];
                        const product = allProducts.find(p => p.id === productId);
                    
                    if (product && window.cartManager) {
                        window.cartManager.addToCart(product, quantity);
                        
                        // Show visual feedback
                        const originalHtml = btn.innerHTML;
                        btn.innerHTML = '<i class="bi bi-check-lg"></i> Added';
                        btn.classList.replace('btn-outline-primary', 'btn-success');
                        setTimeout(() => {
                            btn.innerHTML = originalHtml;
                            btn.classList.replace('btn-success', 'btn-outline-primary');
                        }, 1000);
                    }
                    });
                }
                
                // Cart Modal interactions
                if (e.target.closest('.cart-minus-btn') || e.target.closest('.cart-plus-btn')) {
                    const btn = e.target.closest('button');
                    const itemEl = btn.closest('.cart-item');
                    const id = itemEl.getAttribute('data-id');
                    let qty = parseInt(itemEl.querySelector('.cart-qty-input').value) || 1;
                    
                    if (btn.classList.contains('cart-plus-btn')) {
                        qty += 1;
                    } else if (btn.classList.contains('cart-minus-btn')) {
                        qty -= 1;
                    }
                    if (window.cartManager) {
                        if (qty > 0) window.cartManager.updateQuantity(id, qty);
                        else window.cartManager.removeFromCart(id);
                    }
                }
                
                if (e.target.closest('.cart-remove-btn')) {
                    const id = e.target.closest('.cart-item').getAttribute('data-id');
                    if (window.cartManager) window.cartManager.removeFromCart(id);
                }
            });
            
            document.addEventListener('change', function(e) {
                if (e.target.classList.contains('cart-qty-input')) {
                    const id = e.target.closest('.cart-item').getAttribute('data-id');
                    const qty = parseInt(e.target.value) || 1;
                    if (window.cartManager) window.cartManager.updateQuantity(id, qty);
                }
            });

            // Initialize UI
            updateCartBadge();
            
            // Explicitly initialize Offcanvas to avoid Bootstrap data-attribute bugs
            const cartOffcanvasEl = document.getElementById('cartOffcanvas');
            const cartOffcanvasInstance = new bootstrap.Offcanvas(cartOffcanvasEl);
            
            document.getElementById('viewCartBtn').addEventListener('click', function(e) {
                e.preventDefault();
                cartOffcanvasInstance.show();
            });
            
            cartOffcanvasEl.addEventListener('show.bs.offcanvas', renderCart);
            
            // Checkout Logic
            document.getElementById('checkoutBtn').addEventListener('click', function() {
                const cart = window.cartManager ? window.cartManager.getCart() : [];
                if (cart.length === 0) {
                    alert("Your cart is empty!");
                    return;
                }
                
                if (window.agencyInventoryManager) {
                    window.agencyInventoryManager.addItemsToInventory(cart);
                    window.cartManager.clearCart();
                    
                    // Show success visually inside offcanvas
                    const container = document.getElementById('cartItemsContainer');
                    container.innerHTML = '<div class="text-center text-success mt-5"><i class="bi bi-check-circle-fill fs-1"></i><h5 class="mt-3 fw-bold">Order Placed Successfully!</h5><p>The purchased items have been securely added to your <a href="agency-stocks.html">My Stocks</a> inventory.</p></div>';
                    document.getElementById('cartTotal').innerText = '₹0';
                    updateCartBadge();
                    
                    // Reset button temporarily and hide offcanvas, then redirect
                    const originalText = this.innerHTML;
                    this.innerHTML = '<i class="bi bi-check2-all"></i> Success';
                    this.classList.replace('btn-secondary-custom', 'btn-success');
                    
                    const offcanvasEl = document.getElementById('cartOffcanvas');
                    const offcanvas = bootstrap.Offcanvas.getInstance(offcanvasEl);
                    if(offcanvas) offcanvas.hide();
                    
                    // Redirect immediately to My Stocks page
                    window.location.href = 'agency-stocks.html';
                } else {
                    alert("Error: Inventory manager not found.");
                }
            });
        });
    </script>
    
    <!-- Cart Offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header border-bottom bg-night-blue text-white">
            <h5 class="offcanvas-title fw-bold" id="cartOffcanvasLabel"><i class="bi bi-cart3 me-2"></i> Your Order</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-0">
            <div id="cartItemsContainer" class="flex-grow-1 overflow-auto p-3">
                <!-- Cart items will be injected here -->
            </div>
            <div class="border-top p-3 bg-light mt-auto shadow">
                <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
                    <span>Total Estimate:</span>
                    <span id="cartTotal" class="text-sand-tan-shadow">₹0</span>
                </div>
                <button class="btn btn-secondary-custom w-100 rounded-pill py-2 fw-bold" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script src="js/cartManager.js"></script>
    <script src="js/agencyInventoryManager.js"></script>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
