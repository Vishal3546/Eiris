<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiris - Admin Agencies</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="d-flex min-vh-100 bg-light">
        <!-- Sidebar -->
        <div class="bg-night-blue text-white position-relative animate-slide-right" style="width: 280px;">
            <div class="p-4 d-flex align-items-center border-bottom border-secondary border-opacity-25">
                <i class="bi bi-car-front-fill text-sand-tan me-2" style="font-size: 30px;"></i>
                <h4 class="mb-0 fw-bold text-sand-tan">Admin Portal</h4>
            </div>
            <ul class="nav flex-column p-3 gap-2">
                <li class="nav-item">
                    <a href="admin-dashboard.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-grid-1x2-fill me-3" style="font-size: 20px;"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin-agencies.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-people-fill me-3" style="font-size: 20px;"></i> Agencies
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin-products.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-box-seam-fill me-3" style="font-size: 20px;"></i> Products
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin-purchase.html" class="nav-link d-flex align-items-center p-3 rounded text-white opacity-75 custom-hover" style="transition: all 0.2s;">
                        <i class="bi bi-cart-fill me-3" style="font-size: 20px;"></i> Purchase Requests
                    </a>
                </li>
            </ul>
            <div class="p-4 mt-auto position-absolute bottom-0 w-100" style="max-width: 280px;">
                <a href="index.html" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center border-opacity-25">
                    <i class="bi bi-box-arrow-right me-2" style="font-size: 18px;"></i> Logout
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 d-flex flex-column" style="overflow-y: auto; height: 100vh;">
            <nav class="navbar navbar-expand-lg bg-white border-bottom px-4 py-3 shadow-sm animate-slide-down">
                <div class="container-fluid">
                    <div class="ms-auto d-flex align-items-center gap-3">
                        <span class="text-muted">Welcome, <strong class="text-night-blue">Super Admin</strong></span>
                        <div class="bg-sand-tan text-night-blue fw-bold rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px;">
                            A
                        </div>
                    </div>
                </div>
            </nav>
            
            <div class="p-4 flex-grow-1 animate-fade-in-up">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-night-blue-shadow mb-0">Manage Agencies</h3>
                    <button class="btn btn-primary-custom rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addAgencyModal">
                        <i class="bi bi-plus-lg me-2"></i> Add New Agency
                    </button>
                </div>
                
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4 py-3">Agency Name</th>
                                        <th class="py-3">Location</th>
                                        <th class="py-3">Contact</th>
                                        <th class="py-3">Status</th>
                                        <th class="pe-4 py-3 text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="ps-4 fw-bold">AutoTech Distributors</td>
                                        <td>Mumbai, India</td>
                                        <td>+91 98765 43210</td>
                                        <td><span class="badge bg-success">Active</span></td>
                                        <td class="pe-4 text-end">
                                            <button class="btn btn-sm btn-outline-primary rounded-circle me-2"><i class="bi bi-pencil-fill"></i></button>
                                            <button class="btn btn-sm btn-outline-danger rounded-circle"><i class="bi bi-trash-fill"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="ps-4 fw-bold">Speedy Lights</td>
                                        <td>Delhi, India</td>
                                        <td>+91 99887 76655</td>
                                        <td><span class="badge bg-warning text-dark">Pending</span></td>
                                        <td class="pe-4 text-end">
                                            <button class="btn btn-sm btn-outline-primary rounded-circle me-2"><i class="bi bi-pencil-fill"></i></button>
                                            <button class="btn btn-sm btn-outline-danger rounded-circle"><i class="bi bi-trash-fill"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Agency Modal -->
    <div class="modal fade" id="addAgencyModal" tabindex="-1" aria-labelledby="addAgencyModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content border-0 rounded-4 shadow-lg">
          <div class="modal-header bg-night-blue text-white rounded-top-4 border-0">
            <h5 class="modal-title" id="addAgencyModalLabel">Add New Agency</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <form>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Agency Name</label>
                    <input type="text" class="form-control" placeholder="Enter agency name">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Location</label>
                    <input type="text" class="form-control" placeholder="City, Country">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Contact Number</label>
                    <input type="tel" class="form-control" placeholder="+91 XXXX XXXXX">
                </div>
            </form>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-secondary-custom rounded-pill px-4">Save Agency</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
